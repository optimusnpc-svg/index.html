<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: linear-gradient(135deg, #eef2ff, #f0fdfa);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #eee;
        }

        h2 {
            margin-bottom: 10px;
            color: #111827;
        }

        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 10px;
        }

        .status-box {
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            min-height: 24px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        .cooldown { background: #e2e3e5; color: #383d41; border-color: #d6d8db; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
            overflow: hidden;
            border-radius: 10px;
        }

        th {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 10px;
        }

        td {
            border-bottom: 1px solid #eee;
            padding: 10px;
            text-align: left;
        }

        .btn-manual {
            background: linear-gradient(135deg, #64748b, #334155);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .admin-controls {
            display: none;
            margin-top: 20px;
            flex-direction: column;
            gap: 10px;
            border-top: 2px dashed #ddd;
            padding-top: 15px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        button {
            cursor: pointer;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .btn-export { background: var(--success); color: white; }
        .btn-clear { background: var(--danger); color: white; }

        .btn-admin {
            background: none;
            color: #999;
            margin-top: 20px;
            font-size: 11px;
            text-decoration: underline;
        }

        .btn-delete {
            background: none;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Attendance System</h2>

    <div id="reader"></div>

    <button class="btn-manual" onclick="manualInput()">⌨️ Manual Entry (No QR)</button>

    <div id="status" class="status-box">Ready to Scan...</div>

    <table>
        <thead>
            <tr>
                <th>Student</th>
                <th>Time</th>
                <th class="admin-col" style="display:none;">Action</th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>

    <div id="adminPanel" class="admin-controls">
        <div class="button-group">
            <button class="btn-export" onclick="exportToCSV()">Export Excel</button>
            <button class="btn-clear" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <button class="btn-admin" onclick="toggleAdmin()">Admin Login</button>
</div>

<script>
    const studentDatabase = {
        "1001": "Nabeel 9f",
        "1002": "Ayaan 5f",
        "1003": "Ayesha 1b",
        "1004": "Rojammal 12d",
        "1005": "Sugaibudeen 12d"
    };

    let lastScannedId = null;
    let lastScanTime = 0;
    const SPAM_COOLDOWN = 5000;
    let isAdmin = false;

    function manualInput() {
        const id = prompt("Enter Student ID:");
        if (id && studentDatabase[id]) {
            processLog(id);
        } else if (id) {
            alert("ID not found!");
        }
    }

    function processLog(id) {
        const now = Date.now();
        const statusDiv = document.getElementById('status');
        const today = new Date().toLocaleDateString();

        if (id === lastScannedId && (now - lastScanTime) < SPAM_COOLDOWN) {
            statusDiv.innerText = "Wait 5s to log again.";
            statusDiv.className = "status-box cooldown";
            return;
        }

        let attendance = JSON.parse(localStorage.getItem('school_att') || '[]');

        if (attendance.find(e => e.id === id && e.date === today)) {
            statusDiv.innerText = "Already logged today!";
            statusDiv.className = "status-box warning";
            return;
        }

        const name = studentDatabase[id] || "Unknown";
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

        attendance.push({ id, name, time, date: today });
        localStorage.setItem('school_att', JSON.stringify(attendance));

        lastScannedId = id;
        lastScanTime = now;

        statusDiv.innerText = "Welcome, " + name;
        statusDiv.className = "status-box success";

        renderTable();
    }

    function onScanSuccess(decodedText) {
        processLog(decodedText);
    }

    function renderTable() {
        const logBody = document.getElementById('logBody');
        const data = JSON.parse(localStorage.getItem('school_att') || '[]');

        document.querySelectorAll('.admin-col').forEach(el =>
            el.style.display = isAdmin ? 'table-cell' : 'none'
        );

        logBody.innerHTML = data.slice().reverse().map((entry, index) => {
            const realIndex = data.length - 1 - index;
            return `
                <tr>
                    <td>${entry.name}</td>
                    <td>${entry.time}</td>
                    <td style="display:${isAdmin ? 'table-cell' : 'none'}">
                        <button class="btn-delete" onclick="deleteEntry(${realIndex})">Del</button>
                    </td>
                </tr>`;
        }).join('');
    }

    function toggleAdmin() {
        if (prompt("Password:") === "admin123") {
            isAdmin = !isAdmin;
            document.getElementById('adminPanel').style.display = isAdmin ? 'flex' : 'none';
            renderTable();
        }
    }

    function deleteEntry(i) {
        let data = JSON.parse(localStorage.getItem('school_att') || '[]');
        data.splice(i, 1);
        localStorage.setItem('school_att', JSON.stringify(data));
        renderTable();
    }

    function clearAll() {
        if (confirm("Clear all?")) {
            localStorage.removeItem('school_att');
            renderTable();
        }
    }

    function exportToCSV() {
        const data = JSON.parse(localStorage.getItem('school_att') || '[]');
        let csv = "ID,Name,Date,Time\n" +
            data.map(e => `"${e.id}","${e.name}","${e.date}","${e.time}"`).join("\n");

        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = "Attendance.csv";
        a.click();
    }

    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: 250 }
    );

    html5QrcodeScanner.render(onScanSuccess);
    window.onload = renderTable;
</script>

</body>
</html>
