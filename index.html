<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Attendance System</title>
    <script src="https://unpkg.com"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: linear-gradient(135deg, #eef2ff, #f0fdfa);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; border: 1px solid #eee; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .status-box { margin: 15px 0; padding: 15px; border-radius: 10px; font-weight: bold; min-height: 24px; transition: 0.3s; border: 1px solid transparent; }
        .success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        .cooldown { background: #e2e3e5; color: #383d41; border-color: #d6d8db; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; border-radius: 10px; overflow: hidden; }
        th { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        
        .tag-late { color: var(--danger); font-weight: bold; font-size: 10px; border: 1px solid var(--danger); padding: 2px 4px; border-radius: 4px; margin-left: 5px; }
        .admin-controls { display: none; margin-top: 20px; flex-direction: column; gap: 10px; border-top: 2px dashed #ddd; padding-top: 15px; }
        .btn-manual { background: #64748b; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-export { background: var(--success); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        .late-input-group { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Attendance System</h2>
    <div id="reader"></div>
    <button class="btn-manual" onclick="manualInput()">⌨️ Manual Entry</button>
    <div id="status" class="status-box">Ready to Scan...</div>

    <table>
        <thead><tr><th>Student</th><th>Time</th><th class="admin-col" style="display:none;">Action</th></tr></thead>
        <tbody id="logBody"></tbody>
    </table>

    <div id="adminPanel" class="admin-controls">
        <div class="late-input-group">
            <label>Late After:</label>
            <input type="time" id="lateThreshold" value="08:00" onchange="updateLateTime()">
        </div>
        <button class="btn-export" onclick="exportToCSV()">Export Excel (CSV)</button>
        <button style="background:var(--danger); color:white; border:none; padding:10px; border-radius:8px;" onclick="clearAll()">Clear All</button>
    </div>
    <button style="background:none; color:#999; margin-top:20px; font-size:11px; text-decoration:underline; border:none;" onclick="toggleAdmin()">Admin Login</button>
</div>

<script>
    const studentDatabase = { "1001": "Nabeel 9f", "1002": "Ayaan 5f", "1003": "Ayesha 1b", "1004": "Rojammal 12d", "1005": "Sugaibudeen 12d" };
    let isAdmin = false;
    let lateTime = localStorage.getItem('late_threshold') || "08:00";
    document.getElementById('lateThreshold').value = lateTime;

    function updateLateTime() {
        lateTime = document.getElementById('lateThreshold').value;
        localStorage.setItem('late_threshold', lateTime);
    }

    function processLog(id) {
        const now = new Date();
        const today = now.toLocaleDateString();
        const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        let attendance = JSON.parse(localStorage.getItem('school_att') || '[]');
        if (attendance.find(e => e.id === id && e.date === today)) {
            showStatus("Already logged today!", "warning");
            return;
        }

        const isLate = currentTimeStr > lateTime;
        const entry = {
            id, 
            name: studentDatabase[id] || "Unknown", 
            time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            date: today,
            status: isLate ? "LATE" : "PRESENT"
        };

        attendance.push(entry);
        localStorage.setItem('school_att', JSON.stringify(attendance));
        showStatus("Welcome, " + entry.name, "success");
        renderTable();
    }

    function renderTable() {
        const logBody = document.getElementById('logBody');
        const data = JSON.parse(localStorage.getItem('school_att') || '[]');
        logBody.innerHTML = data.slice().reverse().map((e, i) => `
            <tr>
                <td>${e.name} ${e.status === 'LATE' ? '<span class="tag-late">LATE</span>' : ''}</td>
                <td>${e.time}</td>
                <td style="display:${isAdmin ? 'table-cell' : 'none'}">
                    <button onclick="deleteEntry(${data.length-1-i})">Del</button>
                </td>
            </tr>`).join('');
    }

    function exportToCSV() {
        const data = JSON.parse(localStorage.getItem('school_att') || '[]');
        const csv = "ID,Name,Date,Time,Status\n" + data.map(e => `"${e.id}","${e.name}","${e.date}","${e.time}","${e.status}"`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Attendance_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function showStatus(msg, cls) {
        const s = document.getElementById('status');
        s.innerText = msg; s.className = "status-box " + cls;
    }

    function toggleAdmin() {
        if (prompt("Password:") === "admin123") {
            isAdmin = !isAdmin;
            document.getElementById('adminPanel').style.display = isAdmin ? 'flex' : 'none';
            renderTable();
        }
    }

    function manualInput() {
        const id = prompt("Enter Student ID:");
        if (id && studentDatabase[id]) processLog(id);
        else if (id) alert("ID not found!");
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render(processLog);
    renderTable();
</script>
</body>
</html>
